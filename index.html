<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=./api-intelligence/">
  <title>API Atlas — Finance Edition</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #06101c; color: #f4f8ff; }
    main { width: min(92vw, 520px); padding: 30px; text-align: center; border: 1px solid #23405d; border-radius: 24px; background: #0b1a2c; }
    h1 { margin: 0 0 12px; }
    p { color: #a9bfd3; line-height: 1.8; }
    a { display: inline-block; margin-top: 10px; padding: 13px 20px; border-radius: 14px; background: #21a4c7; color: #04111b; font-weight: 800; text-decoration: none; }
  </style>
  <script>
    const target = new URL('./api-intelligence/', window.location.href);
    target.search = window.location.search;
    target.hash = window.location.hash;
    window.location.replace(target.href);
  </script>
</head>
<body>
  <main>
    <h1>API Atlas</h1>
    <p>يتم فتح التطبيق الفعلي الآن…</p>
    <a href="./api-intelligence/">فتح التطبيق</a>
  </main>
</body>
</html>
