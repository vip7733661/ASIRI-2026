name: Deploy API Atlas Live

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "signal-lab.html"
      - "styles.css"
      - "src/**"
      - "api-intelligence/**"
      - "scripts/check-api-health.mjs"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run live API availability checks
        run: |
          node scripts/check-api-health.mjs \
            --catalog api-intelligence/catalog.js \
            --output api-intelligence/live-status.json \
            --timeout-ms 12000 \
            --concurrency 4
          node -e "const x=require('./api-intelligence/live-status.json'); console.log(x.summary)"

      - name: Persist latest live results when permitted
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api-intelligence/live-status.json
          if git diff --cached --quiet; then
            echo "No live-status changes to commit."
          else
            git commit -m "Update live API health [skip ci]"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html signal-lab.html styles.css _site/
          cp -R src api-intelligence _site/

      - name: Verify generated live payload
        run: |
          test -s _site/api-intelligence/live-status.json
          node -e "const x=require('./_site/api-intelligence/live-status.json'); if (!x.generatedAt || x.summary.total < 1) process.exit(1); console.log(x.generatedAt, x.summary)"

      - name: Upload complete site tree
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
