name: Deploy API Atlas Live

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "signal-lab.html"
      - "styles.css"
      - "src/**"
      - "api-intelligence/**"
      - "scripts/check-api-health.mjs"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run live API availability checks
        run: |
          node scripts/check-api-health.mjs \
            --catalog api-intelligence/catalog.js \
            --output api-intelligence/live-status.json \
            --timeout-ms 12000 \
            --concurrency 4
          node -e "const x=require('./api-intelligence/live-status.json'); console.log(x.summary)"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload complete site tree
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
