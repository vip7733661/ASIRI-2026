name: Deploy API Atlas Live

on:
  push:
    branches:
      - main
    paths:
      - "api-intelligence/**"
      - "scripts/check-api-health.mjs"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run live API availability checks
        run: |
          node scripts/check-api-health.mjs \
            --catalog api-intelligence/catalog.js \
            --output api-intelligence/live-status.json \
            --timeout-ms 12000 \
            --concurrency 4
          node -e "const x=require('./api-intelligence/live-status.json'); if (!x.generatedAt || x.summary.total < 1) process.exit(1); console.log(x.generatedAt, x.summary)"

      - name: Prepare API Atlas as site root
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R api-intelligence/. _site/
          test -s _site/index.html
          test -s _site/live-status.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload API Atlas site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
