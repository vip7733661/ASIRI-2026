name: DefeatBeta Lab

on:
  push:
    paths:
      - "defeatbeta_lab/**"
      - "defeatbeta-demo.html"
      - "tests/test_defeatbeta_*.py"
      - ".github/workflows/defeatbeta-lab.yml"
  pull_request:
    paths:
      - "defeatbeta_lab/**"
      - "defeatbeta-demo.html"
      - "tests/test_defeatbeta_*.py"
      - ".github/workflows/defeatbeta-lab.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: defeatbeta_lab/requirements-test.txt
      - name: Install test dependencies
        run: python -m pip install -r defeatbeta_lab/requirements-test.txt
      - name: Compile Python package
        run: python -m compileall -q defeatbeta_lab
      - name: Run DefeatBeta tests
        run: python -m pytest tests/test_defeatbeta_*.py -q

  runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: defeatbeta_lab/requirements-web.txt
      - name: Install runtime and API dependencies
        run: python -m pip install -r defeatbeta_lab/requirements-web.txt
      - name: Verify provider, API and CLI imports
        run: |
          python -c "from defeatbeta_api.data.ticker import Ticker; from defeatbeta_lab.api import app; from defeatbeta_lab.providers import DefeatBetaProvider, YFinanceProvider; print('runtime imports ok')"
          python -m defeatbeta_lab.cli --help
      - name: Run live DefeatBeta sample
        run: |
          python -m defeatbeta_lab.cli AAPL --start 2026-07-01 --end 2026-07-10 --output-dir /tmp/defeatbeta-smoke
          test -s /tmp/defeatbeta-smoke/AAPL_defeatbeta.csv
          test -s /tmp/defeatbeta-smoke/AAPL_metrics.json
          test -s /tmp/defeatbeta-smoke/AAPL_report.html
      - name: Smoke-test FastAPI server
        run: |
          python -m uvicorn defeatbeta_lab.api:app --host 127.0.0.1 --port 8000 >/tmp/defeatbeta-api.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for attempt in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:8000/api/health >/tmp/health.json; then break; fi
            sleep 1
          done
          grep -q '"status":"ok"' /tmp/health.json
          curl -fsS http://127.0.0.1:8000/ >/tmp/demo.html
          grep -q 'DefeatBeta Market Data Reliability Lab' /tmp/demo.html
