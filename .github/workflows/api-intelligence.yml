name: API Intelligence PWA

on:
  push:
    paths:
      - "api-intelligence/**"
      - "tests/api-intelligence.test.mjs"
      - ".github/workflows/api-intelligence.yml"
  pull_request:
    paths:
      - "api-intelligence/**"
      - "tests/api-intelligence.test.mjs"
      - ".github/workflows/api-intelligence.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate JavaScript syntax
        run: |
          node --check api-intelligence/catalog.js
          node --check api-intelligence/app.js
          node --check api-intelligence/sw.js
      - name: Run PWA tests
        run: node --test tests/api-intelligence.test.mjs
      - name: Smoke-test static server
        run: |
          python3 -m http.server 4174 --directory api-intelligence >/tmp/api-atlas.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:4174/index.html >/tmp/api-atlas.html; then break; fi
            sleep 1
          done
          grep -q "API Atlas" /tmp/api-atlas.html
          curl -fsS http://127.0.0.1:4174/manifest.webmanifest | python3 -m json.tool >/dev/null
          curl -fsS http://127.0.0.1:4174/catalog.js | grep -q "public-apis/public-apis"
